name: Packaging

on:
  release:
    types:
      - created

jobs:
  ubuntu:
    name: Ubuntu packages
    env:
      CARGO_DEB_VER: 2.12.0
      DEBIAN_FRONTEND: noninteractive
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: "ubuntu:22.04"
            platform: "ubuntu22"
          - image: "ubuntu:24.04"
            platform: "ubuntu24"
          - image: "ubuntu:26.04"
            platform: "ubuntu26"
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install common libs
        run: |
          apt-get update -y
          apt-get install -y build-essential curl git pkg-config libssl-dev lintian libpqxx-dev libxmlsec1-dev libclang-dev

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get Rust toolchain channel
        run: |
          echo "RUST_CHANNEL=$(sed -nrE 's/^channel = "(.*)"$/\1/p' "$GITHUB_WORKSPACE"/rust-toolchain.toml)" >> $GITHUB_ENV

      - name: Install Rust ${{ env.RUST_CHANNEL }}
        uses: dtolnay/rust-toolchain@888c2e1ea69ab0d4330cbf0af1ecc7b68f368cc1 # v1
        with:
          toolchain: ${{ env.RUST_CHANNEL }}

      - name: Install Cargo Deb
        run: cargo install cargo-deb --vers=${{ env.CARGO_DEB_VER }} --locked

      - name: Create package
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ github.event.release.tag_name }}
        run: cargo deb -p akr -o "akr_${VERSION}_${PLATFORM}_amd64.deb"

      - name: Verify package
        run: |
          # do not use exit codes while errors occured
          lintian -v akr_*.deb || true

      - name: Upload deb asset to release
        if: ${{ github.event.release.upload_url }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: akr_*.deb

  rhel:
    name: RHEL-compatible packages (Rocky Linux)
    env:
      CARGO_GENERATE_RPM_VER: 0.16.1
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: "rockylinux/rockylinux:9"
            platform: "rhel9"
            repo: "crb"
          - image: "rockylinux/rockylinux:10"
            platform: "rhel10"
            repo: "crb"
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Enable repositories
        shell: sh
        run: |
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled ${{ matrix.repo }}
          dnf clean all && dnf makecache

      - name: Install common libs
        shell: sh
        run: |
          # Don't install `curl` — `curl-minimal` is preinstalled and conflicts on RHEL 9+ images.
          dnf install -y gcc make openssl-devel gzip git

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get Rust toolchain channel
        shell: sh
        run: |
          RUST_CHANNEL=$(sed -nrE 's/^channel = "(.*)"$/\1/p' "$GITHUB_WORKSPACE"/rust-toolchain.toml)
          echo "RUST_CHANNEL=$RUST_CHANNEL" >> $GITHUB_ENV

      - name: Install Rust via rustup
        shell: sh
        run: |
          # Install rustup and Rust toolchain directly (avoids bash 5.x incompatibility with rust-toolchain action)
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$RUST_CHANNEL" --profile minimal
          . "$HOME/.cargo/env"
          rustc --version
          cargo --version

      - name: Install Cargo Generate RPM
        shell: sh
        run: |
          . "$HOME/.cargo/env"
          cargo install cargo-generate-rpm --vers=${{ env.CARGO_GENERATE_RPM_VER }} --locked

      - name: Build binary
        shell: sh
        run: |
          . "$HOME/.cargo/env"
          cargo build --release

      - name: Remove all symbol and relocation information
        run: strip -s target/release/akr

      - name: Add dist to release
        run: dist=$(rpm --eval %{?dist}); sed -i -e 's/release = "\(.*\)"/release = "\1'$dist'"/g' Cargo.toml

      - name: Create package
        shell: sh
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          . "$HOME/.cargo/env"
          cargo generate-rpm -p crates/kr -o "akr_${VERSION}_${PLATFORM}.rpm"

      - name: Verify package
        shell: sh
        run: |
          # do not use exit codes when errors occurred
          rpm -qip akr_*.rpm || true

      - name: Upload rpm asset to release
        if: ${{ github.event.release.upload_url }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: akr_*.rpm

  centos:
    name: CentOS Stream packages
    env:
      CARGO_GENERATE_RPM_VER: 0.16.1
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: "quay.io/centos/centos:stream9"
            platform: "centos9"
          - image: "quay.io/centos/centos:stream10"
            platform: "centos10"
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Enable CRB and install packages
        run: |
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled crb || true
          # Don't install `curl` — `curl-minimal` is preinstalled and conflicts on CentOS Stream 9+ images.
          dnf install -y gcc make openssl-devel gzip git

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get Rust toolchain channel
        run: |
          echo "RUST_CHANNEL=$(sed -nrE 's/^channel = "(.*)"$/\1/p' "$GITHUB_WORKSPACE"/rust-toolchain.toml)" >> $GITHUB_ENV

      - name: Install Rust ${{ env.RUST_CHANNEL }}
        uses: dtolnay/rust-toolchain@888c2e1ea69ab0d4330cbf0af1ecc7b68f368cc1 # v1
        with:
          toolchain: ${{ env.RUST_CHANNEL }}

      - name: Install Cargo Generate RPM
        run: cargo install cargo-generate-rpm --vers=${{ env.CARGO_GENERATE_RPM_VER }} --locked

      - name: Build binary
        run: cargo build --release

      - name: Remove all symbol and relocation information
        run: strip -s target/release/akr

      - name: Add dist to release
        run: dist=$(rpm --eval %{?dist}); sed -i -e 's/release = "\(.*\)"/release = "\1'$dist'"/g' Cargo.toml

      - name: Create package
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ github.event.release.tag_name }}
        run: cargo generate-rpm -p crates/kr -o "akr_${VERSION}_${PLATFORM}.rpm"

      - name: Verify package
        run: |
          # do not use exit codes when errors occurred
          rpm -qip akr_*.rpm || true

      - name: Upload rpm asset to release
        if: ${{ github.event.release.upload_url }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: akr_*.rpm
