name: Brew Bottle

on: 
  release:
    types:
      - created

jobs:
  bottle:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get Rust toolchain channel
        run: |
          echo "RUST_CHANNEL=$(sed -nrE 's/^channel = "(.*)"$/\1/p' "$GITHUB_WORKSPACE"/rust-toolchain.toml)" >> $GITHUB_ENV

      - name: Install Rust ${{ env.RUST_CHANNEL }}
        uses: dtolnay/rust-toolchain@888c2e1ea69ab0d4330cbf0af1ecc7b68f368cc1 # v1
        with:
          toolchain: ${{ env.RUST_CHANNEL }}

      - name: Upload bottle assets to release
        if: ${{ github.event.release.upload_url }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          cargo build --release

          mkdir -p /tmp/akr/${VERSION}/bin
          cp ./target/release/akr /tmp/akr/${VERSION}/bin/
          tar -czf akr-${VERSION}.arm64_big_sur.bottle.tar.gz -C /tmp akr
          for codename in arm64_monterey arm64_ventura arm64_sonoma arm64_sequoia; do
            cp akr-${VERSION}.arm64_big_sur.bottle.tar.gz akr-${VERSION}.${codename}.bottle.tar.gz
          done

          ls *.bottle.tar.gz

          # clean up
          rm -rf /tmp/akr

          gh release upload $VERSION *.bottle.tar.gz
